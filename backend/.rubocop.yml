plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - "db/schema.rb"
    - "bin/**/*"
    - "node_modules/**/*"
    - "vendor/**/*"
    - "tmp/**/*"
    - "log/**/*"
    - "coverage/**/*"

# ── Style ─────────────────────────────────────────────────────────────────────

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma

# ── Metrics ───────────────────────────────────────────────────────────────────

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "config/routes.rb"
    - "db/seeds.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "app/services/employees/list_service.rb"

Metrics/PerceivedComplexity:
  Exclude:
    - "app/services/employees/list_service.rb"

Metrics/MethodLength:
  Max: 45
  Exclude:
    - "app/services/**/*"

Metrics/AbcSize:
  Max: 50
  Exclude:
    - "app/services/**/*"

Metrics/ClassLength:
  Max: 200

# ── Rails ─────────────────────────────────────────────────────────────────────

Rails/FilePath:
  EnforcedStyle: slashes

Rails/I18nLocaleTexts:
  Enabled: false

Rails/SkipsModelValidations:
  AllowedMethods:
    - insert_all
    - upsert_all

# ── RSpec ─────────────────────────────────────────────────────────────────────

RSpec/ExampleLength:
  Max: 25

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 5

RSpec/LetSetup:
  Enabled: false

RSpec/ImplicitSubject:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/SpecFilePathSuffix:
  Enabled: false
